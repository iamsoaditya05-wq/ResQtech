[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* and /socket.io/* to the backend API on Render
[[redirects]]
  from = "/api/*"
  to = "https://resqtech-v01z.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://resqtech-v01z.onrender.com/socket.io/:splat"
  status = 200
  force = true

# SPA fallback — required for React Router (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
