[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — required for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy /api/* and /socket.io/* to the backend API
# Set API_URL in Netlify environment variables to your Railway/backend URL
[[redirects]]
  from = "/api/*"
  to = ":API_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = ":API_URL/socket.io/:splat"
  status = 200
  force = true
